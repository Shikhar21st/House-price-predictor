<!-- templates/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House Price Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="page-shell">
        <section class="hero">
            <div class="hero__text">
                <p class="eyebrow">Machine learning demo</p>
                <h1>House Price Predictor</h1>
                <p>Enter the house size in square feet and get a fast price prediction using a trained regression model.</p>
            </div>

            <aside class="hero__card">
                <form action="/predict" method="POST" class="predict-form">
                    <label for="size">House Size (sq ft)</label>
                    <input type="number" id="size" name="size" step="0.01" min="0" placeholder="e.g. 1500" required>
                    <button type="submit" class="btn">Predict Price</button>

                    {% if prediction %}
                        <div class="result">{{ prediction }}</div>
                    {% endif %}
                </form>
            </aside>
        </section>

        <footer class="footer">
            <p>Built with Flask, scikit-learn, and custom CSS styling.</p>
        </footer>
    </div>
</body>
</html>
